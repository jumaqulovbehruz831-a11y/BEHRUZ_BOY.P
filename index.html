<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEKHA PLATFORM | Coding Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: white; overflow: hidden; }
        .bg-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #001f3f 0%, #000 90%); z-index: -1; }
        
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); padding: 35px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        h1 { font-size: 30px; letter-spacing: 4px; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px rgba(0,116,217,0.5); }
        input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #0074D9; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background: #fff; color: #000; }
        
        .forgot { margin-top: 15px; font-size: 12px; color: #444; cursor: pointer; display: block; }
        
        #apps { display: none; max-height: 85vh; overflow-y: auto; padding-right: 5px; }
        #apps::-webkit-scrollbar { width: 5px; }
        #apps::-webkit-scrollbar-thumb { background: #0074D9; border-radius: 10px; }

        .section-title { font-size: 13px; color: #00d2ff; text-align: left; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .link { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .link:hover { background: rgba(0,116,217,0.15); border-color: #00d2ff; transform: translateY(-3px); }
        .icon { font-size: 20px; }
        .full { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="login" class="card">
        <h1>BEKHA</h1>
        <input type="text" id="passInput" placeholder="PASSWORD">
        <button class="btn" onclick="check()">Login</button>
        <a class="forgot" onclick="secretEntry()">Forgot the password?</a>
    </div>

    <div id="apps" class="card">
        <h1>PLATFORMA</h1>
        
        <div class="section-title">💻 Dasturlash darslari</div>
        <div class="grid">
            <a href="https://replit.com" target="_blank" class="link">
                <span class="icon">🐍</span> Python Online
            </a>
            <a href="https://www.w3schools.com" target="_blank" class="link">
                <span class="icon">🌐</span> W3Schools
            </a>
            <a href="https://mohirdev.uz" target="_blank" class="link">
                <span class="icon">🎓</span> Mohirdev (UZ)
            </a>
            <a href="https://pdp.uz" target="_blank" class="link">
                <span class="icon">🚀</span> PDP Online
            </a>
            <a href="https://www.sololearn.com" target="_blank" class="link full">
                <span class="icon">📱</span> SoloLearn (Boshlovchilar uchun)
            </a>
        </div>

        <div class="section-title">🔗 Ijtimoiy Tarmoqlar</div>
        <div class="grid">
            <a href="https://instagram.com" target="_blank" class="link">Instagram</a>
            <a href="https://youtube.com" target="_blank" class="link">YouTube</a>
        </div>

        <button onclick="location.reload()" style="margin-top:30px; background:none; color:#ff4136; border:none; cursor:pointer; font-size:11px; letter-spacing: 2px;">TIZIMDAN CHIQISH</button>
    </div>

    <script>
        function check() {
            const val = document.getElementById('passInput').value;
            if(val === "Hypershot") { openPlatform(); } 
            else { alert("Xato parol!"); }
        }

        function secretEntry() {
            let secret = prompt("Maxfiy so'zni kiriting:");
            if(secret === "Behruzjon") { openPlatform(); } 
            else { alert("Maxfiy so'z noto'g'ri!"); }
        }

        function openPlatform() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('apps').style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prefrum Platforma</title>
    
    <style>
        body {
            background-color: #0d0d15;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active { display: flex; }

        .card {
            background: #16213e;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #00d4ff;
            text-align: center;
            width: 100%;
            box-shadow: 0 0 15px #00d4ff;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        button {
            background: #1a1a2e;
            color: white;
            border: 1px solid #00d4ff;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00d4ff;
            color: black;
            box-shadow: 0 0 10px #00d4ff;
        }

        .glow-btn {
            background: #00d4ff;
            color: black;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #16213e;
            padding: 15px;
            border-radius: 10px;
            border-bottom: 2px solid #00d4ff;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        .creator { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="card">
            <h1>Prefrum</h1>
            <p>Assalomu Alaykum!</p>
            <input type="password" id="mainPass" placeholder="Parol (001)">
            <button class="glow-btn" onclick="checkLogin()">Kirish</button>
            <p class="creator">Yaratuvchi: Jumaqulov Behruz</p>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="top-bar">
            <span>Prefrum Home</span>
            <span>Ball: <b id="ballDisplay">0</b></span>
        </div>
        <div class="menu-grid">
            <button onclick="alert('Tez kunda...')">💻 Dasturlash</button>
            <button onclick="showPage('math-page')">📐 Matematika</button>
            <button onclick="showPage('games-page')">🎮 O'yinlar</button>
            <button onclick="alert('Kinolar yuklanmoqda...')">🎬 Kinolar</button>
        </div>
        <button onclick="showPage('login-page')" style="margin-top:20px; border-color: red; color: red;">Chiqish (Exit)</button>
    </div>

    <div id="math-page" class="page">
        <h2>Matematika Testi</h2>
        <div class="card">
            <p>Misol: 12 + 8 * 2 = ?</p>
            <div class="menu-grid">
                <button onclick="mathRes(40, this)">40</button>
                <button onclick="mathRes(28, this)">28</button>
                <button onclick="mathRes(20, this)">20</button>
            </div>
            <p id="math-hint"></p>
        </div>
        <button onclick="showPage('home-page')" style="margin-top:20px;">Orqaga</button>
    </div>

    <div id="games-page" class="page">
        <h2>O'yinlar bo'limi</h2>
        <div class="card">
            <h3>Roblox Content</h3>
            <p>Admin: Behruz_Boy01fx</p>
            <button class="glow-btn">O'yinga kirish</button>
        </div>
        <button onclick="showPage('home-page')" style="margin-top:20px;">Orqaga</button>
    </div>

    <script>
        let score = 0;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function checkLogin() {
            const p = document.getElementById('mainPass').value;
            if(p === "001" || p === "Behruzjon") {
                showPage('home-page');
            } else {
                alert("Xato parol! (Maslahat: 001)");
            }
        }

        function mathRes(val, btn) {
            const h = document.getElementById('math-hint');
            if(val === 28) {
                h.innerText = "To'g'ri! +5 ball";
                h.style.color = "#00ff00";
                score += 5;
                document.getElementById('ballDisplay').innerText = score;
                btn.style.background = "#00ff00";
            } else {
                h.innerText = "Xato! Qayta ko'ring.";
                h.style.color = "red";
                btn.style.background = "red";
            }
        }
    </script>
</body>
</html>

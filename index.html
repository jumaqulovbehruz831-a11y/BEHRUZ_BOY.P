<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEHRUZJONNING OMMAVIY TIZIMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; background: #000; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .bg-animate { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #001a33 0%, #000 100%); z-index: -1; }
        
        /* ASOSIY TUZILMA */
        #main-wrapper { display: grid; width: 100vw; height: 100vh; grid-template-columns: 260px 1fr 310px; gap: 10px; padding: 10px; }

        /* SIDEBAR */
        .sidebar { background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .menu-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; cursor: pointer; text-align: left; font-size: 13px; transition: 0.3s; }
        .menu-btn:hover { background: #00d2ff; color: #000; font-weight: bold; transform: translateX(5px); }
        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border: none; font-weight: bold; color: #fff !important; }

        /* CENTER VIEWER */
        .viewer-container { background: #fff; border-radius: 20px; overflow: hidden; position: relative; border: 2px solid #222; box-shadow: 0 0 30px rgba(0,210,255,0.1); }
        #content-frame { width: 100%; height: 100%; border: none; }

        /* TARONA AI SIDEBAR */
        .ai-sidebar { background: rgba(0,0,0,0.3); border-radius: 20px; border: 1px solid #00d2ff; padding: 15px; display: flex; flex-direction: column; }
        .ai-header { font-family: 'Orbitron'; font-size: 14px; color: #00d2ff; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #00d2ff; padding-bottom: 10px; }
        
        #ai-lock { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #ai-chat { display: none; flex: 1; flex-direction: column; }
        
        .chat-area { flex: 1; overflow-y: auto; margin-bottom: 10px; padding: 5px; font-size: 13px; }

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEKHA ULTIMATE PLATFORM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; background: #000; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .bg-animate { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #001a33 0%, #000 100%); z-index: -1; }
        
        /* 1. LOGIN EKRANI */
        #login-screen { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; border: 1px solid #00d2ff; text-align: center; box-shadow: 0 0 30px rgba(0,210,255,0.2); }
        .login-box input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; text-align: center; outline: none; }
        
        /* 2. ASOSIY PLATFORMA TUZILISHI */
        #main-wrapper { display: none; width: 100vw; height: 100vh; grid-template-columns: 250px 1fr 300px; gap: 10px; padding: 10px; }

        .sidebar { background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .menu-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,210,255,0.1); border: 1px solid #00d2ff; color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: left; }
        .menu-btn:hover { background: #00d2ff; color: #000; font-weight: bold; }
        .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border: none; }

        .viewer-container { background: #fff; border-radius: 20px; overflow: hidden; position: relative; border: 2px solid #222; }
        #content-frame { width: 100%; height: 100%; border: none; }

        .ai-sidebar { background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid #00d2ff; padding: 15px; display: flex; flex-direction: column; }
        .ai-header { font-family: 'Orbitron'; font-size: 14px; color: #00d2ff; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #00d2ff; padding-bottom: 10px; }
        
        #ai-lock { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #ai-chat { display: none; flex: 1; flex-direction: column; }
        
        .chat-area { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .msg-t { color: #00d2ff; font-size: 13px; margin-bottom: 10px; background: rgba(0,210,255,0.05); padding: 8px; border-radius: 8px; }
        .msg-u { color: #fff; font-size: 13px; text-align: right; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; }

        .action-btn { background: #00d2ff; color: #000; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .top-info { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #00d2ff; font-family: 'Orbitron'; z-index: 5; }
    </style>
</head>
<body>
    <div class="bg-animate"></div>
    <div class="top-info">CREATOR: JUMAQULOV BEHRUZ | VERSION 2.1</div>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; font-size:22px; color:#00d2ff">BEKHA SYSTEM</h1>
            <input type="text" id="main-pass" placeholder="PASSWORD (Hypershot)">
            <button class="action-btn" onclick="unlockSystem()">TIZIMGA KIRISH</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div class="sidebar">
            <h3 style="color:#ffcc00; margin-bottom:15px; font-size:14px">MENU</h3>
            <button class="menu-btn" onclick="openInternal('https://python.sariq.dev')">🐍 Python Darslik</button>
            <button class="menu-btn" onclick="openInternal('https://play2048.co/')">🔢 2048 O'yini</button>
            <button class="menu-btn" onclick="openInternal('https://www.google.com/logos/2010/pacman10-i.html')">🟡 Pac-Man</button>
            
            <button class="menu-btn insta-btn" onclick="checkFollowAndOpen()">📸 Instagram</button>
            
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-size:12px">🔴 Tizimdan chiqish</button>
        </div>

        <div class="viewer-container">
            <iframe id="content-frame" src="https://python.sariq.dev"></iframe>
        </div>

        <div class="ai-sidebar">
            <div class="ai-header">TARONA AI</div>
            <div id="ai-lock">
                <input type="text" id="ai-code" placeholder="CODE (0001)" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px; text-align:center;">
                <button class="action-btn" onclick="unlockAI()">OCHISH</button>
            </div>
            <div id="ai-chat">
                <div class="chat-area" id="chatBox"><div class="msg-t"><b>Tarona:</b> Salom Behruzjon!</div></div>
                <input type="text" id="ai-msg-input" placeholder="Yozing..." style="width:100%; padding:10px; margin-bottom:5px; background:#000; border:1px solid #00d2ff; color:#fff; border-radius:8px;">
                <button class="action-btn" onclick="sendToAI()">YUBORISH</button>
            </div>
        </div>
    </div>

    <script>
        function unlockSystem() {
            if(document.getElementById('main-pass').value === "Hypershot") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'grid';
            } else { alert("Asosiy parol xato!"); }
        }

        function openInternal(link) {
            document.getElementById('content-frame').src = link;
        }

        // Instagram uchun maxsus funksiya
        function checkFollowAndOpen() {
            alert("Avval _behruz_real ga follow bosing!");
            // OK bosilganda Instagram ochiladi
            openInternal('https://www.instagram.com/_behruz_real/');
        }

        function unlockAI() {
            if(document.getElementById('ai-code').value === "0001") {
                document.getElementById('ai-lock').style.display = 'none';
                document.getElementById('ai-chat').style.display = 'flex';
            } else { alert("AI KODI XATO!"); }
        }

        function sendToAI() {
            let input = document.getElementById('ai-msg-input');
            let box = document.getElementById('chatBox');
            if(!input.value.trim()) return;
            box.innerHTML += `<div class="msg-u"><b>Siz:</b> ${input.value}</div>`;
            setTimeout(() => {
                box.innerHTML += `<div class="msg-t"><b>Tarona:</b> Tushundim, Behruzjon!</div>`;
                box.scrollTop = box.scrollHeight;
                input.value = "";
            }, 600);
        }
    </script>
</body>
</html>

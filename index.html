<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEKHA ULTIMATE PLATFORM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; background: #000; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* Fon */
        .bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #001529 0%, #000 100%); z-index: -1; }
        
        /* Login ekrani */
        #login-screen { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(20px); }
        .login-box { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; border: 1px solid #00d2ff; text-align: center; }

        /* Asosiy Platforma */
        #main-platform { display: none; width: 95vw; height: 90vh; background: rgba(255,255,255,0.02); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); display: none; grid-template-columns: 280px 1fr 320px; gap: 15px; padding: 15px; }

        /* Chap menyu */
        .sidebar { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .nav-btn:hover { background: #00d2ff; color: #000; }

        /* Markaziy kontent (Iframe) */
        .content-area { background: #fff; border-radius: 20px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* O'ng tomon: Tarona AI */
        .ai-panel { background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid #00d2ff; display: flex; flex-direction: column; padding: 15px; }
        #ai-lock-view { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #ai-chat-view { display: none; flex: 1; flex-direction: column; }
        
        .chat-messages { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 10px; padding-right: 5px; }
        .ai-txt { color: #00d2ff; margin-bottom: 8px; border-bottom: 1px solid rgba(0,210,255,0.1); padding-bottom: 5px; }
        .user-txt { color: #fff; margin-bottom: 8px; text-align: right; }
        
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; outline: none; }
        .small-btn { padding: 8px; background: #00d2ff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 100%; }

        .header-title { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; font-size: 12px; color: #00d2ff; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="header-title">YARATUVCHI: JUMAQULOV BEHRUZ 👑</div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom:20px; font-family: 'Orbitron';">BEKHA SYSTEM</h2>
            <input type="text" id="pass" placeholder="PAROL (Hypershot)">
            <button class="small-btn" onclick="login()" style="height:45px">KIRISH</button>
        </div>
    </div>

    <div id="main-platform">
        <div class="sidebar">
            <h3 style="font-size:14px; margin-bottom:20px; color:#ffcc00">KUTUBXONA</h3>
            <button class="nav-btn" onclick="loadPage('https://python.sariq.dev')">🐍 Sariq Dev Python</button>
            <button class="nav-btn" onclick="loadPage('https://play2048.co/')">🔢 2048 O'yini</button>
            <button class="nav-btn" onclick="loadPage('https://www.google.com/logos/2010/pacman10-i.html')">🟡 Pac-Man</button>
            <button class="nav-btn" onclick="loadPage('https://tbot.xyz/lumber/')">🌲 LumberJack</button>
            <hr style="opacity:0.1; margin:15px 0">
            <button class="nav-btn" style="color:red" onclick="location.reload()">🔴 Chiqish</button>
        </div>

        <div class="content-area">
            <iframe id="viewer" src="https://python.sariq.dev"></iframe>
        </div>

        <div class="ai-panel">
            <h3 style="font-family:'Orbitron'; font-size:12px; color:#00d2ff; text-align:center; margin-bottom:15px">TARONA AI</h3>
            
            <div id="ai-lock-view">
                <p style="font-size:11px; color:#666; margin-bottom:10px">AI terminaliga kirish uchun kodni kiriting</p>
                <input type="text" id="ai-code" placeholder="KOD (0001)">
                <button class="small-btn" onclick="unlockAI()">OCHISH</button>
            </div>

            <div id="ai-chat-view">
                <div class="chat-messages" id="chatBox">
                    <div class="ai-txt"><b>Tarona:</b> Tizimga xush kelibsiz, Behruzjon!</div>
                </div>
                <input type="text" id="ai-input" placeholder="Savol yozing...">
                <button class="small-btn" onclick="askAI()">YUBORISH</button>
            </div>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === "Hypershot") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-platform').style.display = 'grid';
            } else { alert("Parol xato!"); }
        }

        function loadPage(url) {
            document.getElementById('viewer').src = url;
        }

        function unlockAI() {
            if(document.getElementById('ai-code').value === "0001") {
                document.getElementById('ai-lock-view').style.display = 'none';
                document.getElementById('ai-chat-view').style.display = 'flex';
            } else { alert("Kod xato!"); }
        }

        function askAI() {
            let msg = document.getElementById('ai-input').value;
            let box = document.getElementById('chatBox');
            if(!msg.trim()) return;

            box.innerHTML += `<div class="user-txt"><b>Siz:</b> ${msg}</div>`;
            document.getElementById('ai-input').value = "";

            setTimeout(() => {
                let resp = "Tizim ma'lumot qidirmoqda...";
                if(msg.toLowerCase().includes("salom")) resp = "Assalomu alaykum! Men Tarona AI.";
                box.innerHTML += `<div class="ai-txt"><b>Tarona:</b> ${resp}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEKHA PLATFORM | Created by Behruz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: white;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Tepadagi muallif yozuvi uchun maxsus stil */
        .creator-header {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .creator-header h2 {
            font-family: 'Orbitron', sans-serif; /* Futuristik shrift */
            font-size: 18px;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        /* Emojilar foni */
        .emoji-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .emoji {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: fall infinite linear;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Karta stili */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 35px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 1;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; margin-bottom: 25px; color: #00d2ff; }
        
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0,210,255,0.4); }
        
        .forgot { margin-top: 15px; font-size: 12px; color: #555; cursor: pointer; display: block; }

        #apps { display: none; max-height: 70vh; overflow-y: auto; }
        
        .section-title { font-size: 12px; color: #ffcc00; text-align: left; margin: 15px 0 10px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .link { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; color: white; text-decoration: none; font-size: 13px; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .link:hover { background: rgba(255, 204, 0, 0.1); border-color: #ffcc00; }
    </style>
</head>
<body>

    <div class="creator-header">
        <h2>✨ YARATUVCHI: JUMAQULOV BEHRUZ 👑</h2>
    </div>

    <div class="emoji-background" id="emojiBG"></div>

    <div id="login" class="card">
        <h1>BEKHA</h1>
        <input type="text" id="passInput" placeholder="PASSWORD">
        <button class="btn" onclick="check()">Login</button>
        <a class="forgot" onclick="secretEntry()">Forgot the password?</a>
    </div>

    <div id="apps" class="card">
        <h1>PLATFORMA</h1>
        
        <div class="section-title">🐍 Sariq Dev - Python</div>
        <div class="grid">
            <a href="https://python.sariq.dev" target="_blank" class="link" style="grid-column: span 2;">📖 Python Kitob</a>
            <a href="https://www.youtube.com/@sariqdev" target="_blank" class="link">🎥 YouTube</a>
            <a href="https://t.me/sariqdev" target="_blank" class="link">✈️ Telegram</a>
        </div>

        <div class="section-title">🔗 Ijtimoiy Tarmoqlar</div>
        <div class="grid">
            <a href="https://instagram.com" target="_blank" class="link">Instagram</a>
            <a href="https://youtube.com" target="_blank" class="link">YouTube</a>
        </div>

        <button onclick="location.reload()" style="margin-top:20px; background:none; color:red; border:none; cursor:pointer; font-size:10px;">CHIQISH</button>
    </div>

    <script>
        function check() {
            if(document.getElementById('passInput').value === "Hypershot") { openPlatform(); } 
            else { alert("Xato!"); }
        }

        function secretEntry() {
            if(prompt("Maxfiy so'z?") === "Behruzjon") { openPlatform(); }
        }

        function openPlatform() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('apps').style.display = 'block';
        }

        const emojis = ['💻', '🐍', '⚡', '🔥', '🚀', '💎', '🤴', '✨'];
        const container = document.getElementById('emojiBG');
        for (let i = 0; i < 20; i++) {
            const emoji = document.createElement('div');
            emoji.className = 'emoji';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = Math.random() * 3 + 2 + 's';
            emoji.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(emoji);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Prefrum - Jumaqulov Behruz Loyihasi</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-red: #ff0055;
            --bg-dark: #05050a;
            --card-bg: #11111d;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page {
            display: none; /* Sahifalar yopiq turadi */
            width: 100%;
            max-width: 450px;
            padding: 20px;
            flex-direction: column;
            gap: 15px;
        }

        .active { display: flex; } /* Faqat bitta sahifa ko'rinadi */

        /* Chizmadagi dizayn: Neon ramkalar */
        .box {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px var(--neon-blue);
            text-align: center;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a2e;
            border: 1px solid var(--neon-blue);
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--neon-blue);
        }

        .footer-creater {
            font-size: 11px;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <div class="box">
            <h1>Prefrum</h1>
            <p>Assalomu Alaykum!</p>
            <input type="password" id="passInput" placeholder="Parol (001)">
            <button onclick="checkPass()" style="width: 100%; margin-top: 10px;">KIRISH</button>
            <p style="color: var(--neon-blue); cursor: pointer; font-size: 13px;">Forgot the password?</p>
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <button onclick="alert('Tez kunda!')" style="border-color: gray; font-size: 12px;">Ro'yxatdan o'tish</button>
            <div class="footer-creater">Yaratuvchi: Jumaqulov Behruz</div>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="header">
            <span><b>Prefrum Home</b></span>
            <span>Ball: <b id="ballVal" style="color: var(--neon-blue);">0</b></span>
        </div>
        <div class="btn-grid">
            <button onclick="show(3)">🛡️ Admin</button>
            <button onclick="show(4)">📐 Matematika</button>
            <button onclick="show(5)">💻 Informatika</button>
            <button onclick="show(6)">🎬 Kinolar</button>
            <button onclick="show(7)">🎮 O'yinlar</button>
            <button onclick="show(8)">📚 Kitoblar</button>
        </div>
        <button onclick="show(1)" style="border-color: var(--neon-red); color: var(--neon-red);">EXIT (CHIQISH)</button>
    </div>

    <div id="page3" class="page">
        <h2>Admin Panel</h2>
        <div class="box">
            <p>Foydalanuvchi: Jumaqulov Behruz</p>
            <p>Xabarlar: 0</p>
            <button onclick="alert('Savol qo\'shish oynasi')" style="width: 100%;">Savol Qo'shish</button>
        </div>
        <button onclick="show(2)">Orqaga</button>
    </div>

    <div id="page4" class="page">
        <h2>Matematika Bo'limi</h2>
        <div class="box">
            <p id="mathQuest">Savol: 25 + 25 * 2 = ?</p>
            <div class="btn-grid">
                <button onclick="mathCheck(100, this)">100</button>
                <button onclick="mathCheck(75, this)">75</button>
            </div>
            <p id="mathMsg"></p>
        </div>
        <button onclick="show(2)">Orqaga</button>
    </div>

    <div id="page7" class="page">
        <h2>Ko'ngilochar Bo'lim</h2>
        <div class="box" style="border-color: #ffaa00;">
            <h3>Roblox Content</h3>
            <p>Admin: Behruz_Boy01fx</p>
            <div style="background: #222; height: 100px; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center;">👤 Avatar</div>
            <button style="width: 100%; border-color: #ffaa00;">O'yinga kirish</button>
        </div>
        <button onclick="show(2)">Orqaga</button>
    </div>

    <script>
        let score = 0;

        // Sahifalarni chizmadagi raqami bo'yicha ochish
        function show(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
        }

        // Chizmadagi parol mantiqi
        function checkPass() {
            let p = document.getElementById('passInput').value;
            if(p === "001" || p === "Behruzjon") {
                show(2);
            } else {
                alert("Parol xato! Chizmaga qarang.");
            }
        }

        // Test va Ball tizimi
        function mathCheck(ans, btn) {
            let m = document.getElementById('mathMsg');
            if(ans === 75) {
                m.innerText = "To'g'ri! +5 ball";
                m.style.color = "lime";
                score += 5;
                document.getElementById('ballVal').innerText = score;
                btn.style.background = "green";
            } else {
                m.innerText = "Xato!";
                m.style.color = "red";
                btn.style.background = "red";
            }
        }
    </script>
</body>
</html>
